# Полная копия workflow с отправкой APK на psl1@mail.ru.
# Скопируйте содержимое в .github/workflows/build-android-apk.yml на GitHub
# (Edit file), если git push блокируется без scope workflow.
# Секреты: MAILRU_SMTP_USER, MAILRU_SMTP_PASSWORD
#
# Сборка Android APK на стороне GitHub (удалённый репозиторий).
# Локальный build_apk.bat здесь не запускается — используется Linux + Gradle + Android SDK.
name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'android/**'
      - 'index.html'
      - '*.html'
      - '.github/workflows/build-android-apk.yml'

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # compileSdk 36; build-tools 35.x совместимы с AGP 9.x и стабильно есть в репозитории пакетов SDK
          packages: >-
            platforms;android-36
            build-tools;35.0.0

      - name: Install Gradle 9.4.1
        run: |
          set -euo pipefail
          wget -q -O gradle.zip "https://services.gradle.org/distributions/gradle-9.4.1-bin.zip"
          unzip -q gradle.zip
          echo "GRADLE_HOME=${GITHUB_WORKSPACE}/gradle-9.4.1" >> "$GITHUB_ENV"
          echo "${GITHUB_WORKSPACE}/gradle-9.4.1/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        run: |
          set -euo pipefail
          gradle -p android :app:assembleDebug --no-daemon --stacktrace

      - name: Copy APK to repo root name
        run: |
          set -euo pipefail
          cp -f android/app/build/outputs/apk/debug/app-debug.apk TotalCalendar.apk
          ls -la TotalCalendar.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TotalCalendar-apk
          path: TotalCalendar.apk
          if-no-files-found: error

      # Секреты репозитория (Settings → Secrets → Actions):
      #   MAILRU_SMTP_USER     — ящик @mail.ru для отправки (часто psl1@mail.ru)
      #   MAILRU_SMTP_PASSWORD — пароль; при 2FA — «Пароль для внешнего приложения» в настройках Mail.ru
      - name: Send APK to email
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.mail.ru
          server_port: 465
          secure: true
          username: ${{ secrets.MAILRU_SMTP_USER }}
          password: ${{ secrets.MAILRU_SMTP_PASSWORD }}
          subject: Total Calendar APK — run ${{ github.run_number }}
          to: psl1@mail.ru
          from: ${{ secrets.MAILRU_SMTP_USER }}
          body: |
            Собран debug APK workflow «Build Android APK».
            Run: ${{ github.run_number }}
            Ref: ${{ github.ref_name }}
            SHA: ${{ github.sha }}
            Trigger: ${{ github.event_name }}
          attachments: TotalCalendar.apk
