<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>КАЛЕНДАРЬ (ref)</title>
</head>
<body>
  <noscript>Для работы нужна поддержка JavaScript.</noscript>

  <script>
    (async () => {
      // Загружаем исходный index.html и применяем минимальный безопасный рефакторинг разметки.
      const res = await fetch("./index.html", { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to load index.html: ${res.status}`);
      let html = await res.text();

      // 1) Добавляем doctype и язык документа
      html = html.replace(/^\s*<html>/i, '<!doctype html>\n<html lang="ru">');

      // 2) Нормализуем meta charset и добавляем viewport
      html = html.replace(
        /<meta\s+http-equiv="Content-Type"\s+content="text\/html;\s*charset=utf-8"\s*>/i,
        '<meta charset="utf-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1">'
      );

      // 3) Удаляем пустой <script> в <head>, который ничего не делает
      html = html.replace(/<head>([\s\S]*?)<script>\s*<\/script>/i, "<head>$1");

      // 4) Слегка нормализуем тег body (убираем лишние пробелы)
      html = html.replace(/<body\s+onload=/i, '<body onload=').replace(/<body\s{2,}/i, "<body ");

      document.open();
      document.write(html);
      document.close();
    })().catch((err) => {
      document.body.innerHTML =
        "<pre style='white-space:pre-wrap;color:#b00020'></pre>";
      document.querySelector("pre").textContent = String(err?.stack || err);
    });
  </script>
</body>
</html>
